<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Style Generator | 投影片風格生成工具</title>
    <!-- Tailwind CSS & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #111111 0%, #1a1a1a 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .neon-accent {
            color: #ccff00;
        }
        .btn-neon {
            background-color: #ccff00;
            color: #000;
            border: none;
        }
        .btn-neon:hover {
            background-color: #b3e600;
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white mb-2">
                    Slide Style <span class="neon-accent">Generator</span>
                </h1>
                <p class="text-gray-400">投影片風格生成與規範工具 - 純前端穩定版</p>
            </div>
            <div class="flex gap-2">
                <span class="badge badge-outline border-gray-700 text-gray-400 px-4 py-3">v2.0 Standalone</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Sidebar: Style Selection -->
            <aside class="lg:col-span-3 space-y-6">
                <div class="card glass-panel p-6 shadow-xl">
                    <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 neon-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
                        風格選擇
                    </h2>
                    
                    <div class="form-control w-full">
                        <label class="label"><span class="label-text text-gray-400">選擇模式</span></label>
                        <select id="modeSelect" class="select select-bordered bg-neutral-900 border-gray-700">
                            <option value="select">選擇現有風格</option>
                            <option value="ai">AI 風格擴充 (模擬)</option>
                        </select>
                    </div>

                    <div id="selectArea" class="mt-4">
                        <label class="label"><span class="label-text text-gray-400">風格清單</span></label>
                        <select id="styleSelect" class="select select-bordered w-full bg-neutral-900 border-gray-700">
                            <option disabled selected>載入中...</option>
                        </select>
                    </div>

                    <div id="aiArea" class="mt-4 hidden animate-in fade-in duration-300">
                        <label class="label"><span class="label-text text-gray-400">關鍵字 (如：賽博龐克)</span></label>
                        <input id="aiKeywords" type="text" placeholder="輸入關鍵字..." class="input input-bordered w-full bg-neutral-900 border-gray-700" />
                        <button id="btnGenerate" class="btn btn-neon w-full mt-4">生成新風格</button>
                    </div>
                </div>

                <div class="alert bg-blue-900/20 border-blue-500/30 text-blue-200">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="stroke-current shrink-0 w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <span>本版本為靜態託管，支援手機/電腦秒開。</span>
                </div>
            </aside>

            <!-- Main Content: Editor -->
            <main class="lg:col-span-5 space-y-6">
                <div class="card glass-panel p-6 shadow-xl h-full">
                    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 neon-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                        風格細節 (可編輯)
                    </h2>
                    
                    <div id="editorContent" class="space-y-4">
                        <div class="form-control">
                            <label class="label"><span class="label-text text-gray-400">風格名稱</span></label>
                            <input id="editName" type="text" class="input input-bordered bg-neutral-900 border-gray-700" />
                        </div>
                        <div class="form-control">
                            <label class="label"><span class="label-text text-gray-400">核心概念</span></label>
                            <textarea id="editConcept" class="textarea textarea-bordered h-24 bg-neutral-900 border-gray-700"></textarea>
                        </div>
                        <div id="dynamicSettings" class="space-y-4">
                            <!-- Dynamic settings fields go here -->
                        </div>
                    </div>
                </div>
            </main>

            <!-- Output: Preview & Download -->
            <section class="lg:col-span-4 space-y-6">
                <div class="card glass-panel p-6 shadow-xl">
                    <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 neon-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        預覽與輸出
                    </h2>

                    <div class="space-y-6">
                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm font-semibold text-gray-400">AI 繪圖提示詞 (Prompt)</span>
                                <button id="btnCopyPrompt" class="btn btn-xs btn-ghost text-neon-accent hover:bg-neon-accent/10">複製</button>
                            </div>
                            <div class="p-4 rounded-lg bg-black/40 border border-gray-800 text-sm text-gray-300 min-h-24">
                                <code id="promptOutput" class="break-words">選擇風格以生成提示詞...</code>
                            </div>
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm font-semibold text-gray-400">規範內容預覽</span>
                            </div>
                            <div class="p-4 rounded-lg bg-black/40 border border-gray-800 text-sm text-gray-300 h-64 overflow-y-auto">
                                <pre id="specOutput" class="text-xs font-mono">載入風格後將在此顯示 Markdown 規範...</pre>
                            </div>
                        </div>

                        <div class="space-y-2">
                            <button id="btnDownload" class="btn btn-neon w-full">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                下載風格規範 (.md)
                            </button>
                            <p class="text-[10px] text-gray-500 text-center uppercase tracking-widest">Supports Midjourney, DALL-E, Stable Diffusion</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- UI Logic Scripts -->
    <script>
        // --- DATA LAYER ---
        const STYLE_SOURCE = `
風格：構成主義 / 科技藝術 / 前衛藝術
概念："智慧的建築學"
整體設計設定：
色調： "前衛、構成主義、知性、藝術、未來導向"
視覺識別：
背景色： "暖灰色 / 米色 (#E0E0D0) - 如同紙張般的霧面質感"
文字顏色： "炭灰色 (#333333) - 非純黑"
強調色： "霓虹黃 (#DFFF00) - 用於幾何圖形"
線條顏色： "極細的灰線 (0.5pt) - 如同設計圖般的輔助線"
字體排印：
標題： "混合使用襯線體（Didot, Bodoni）與無襯線體（Helvetica）"
內文： "以小字號沿著網格排列"
數字： "使用打字機風格字體（Courier New）"
投影片結構模式：
章節： "封面 / 概念"
版面類型： "三重拼貼"
設計細節：
- "結構：以網格線將畫面分割為三部分"
- "視覺：將人物的臉部照片轉為黑白，並去背後放置"
- "強調：在人物的背後或前方，疊上霓虹黃的『圓形』或『方形』"
- "裝飾：將同心圓（如同目標瞄準鏡的線稿）置於人物中心"
章節： "分析 / 解剖圖"
版面類型： "工程製圖"
設計細節：
  - "背景：如同方格紙般的細緻網格"
  - "主體：以線稿（線框圖）繪製產品或概念，並將一部分用霓虹黃填滿"
  - "註釋：拉出極細的引導線，如圖面般記述細節（例如：Fig.1, Fig.2）"
章節： "流程 / 流程圖"
版面類型： "幾何連結"
設計細節：
  - "元素：配置霓虹黃的正圓形、正方形、三角形"
  - "連結：用點線或虛線連接圖形，表現邏輯上的流程"
  - "照片：將部分圖形作為遮罩，並在其中嵌入黑白照片"
章節： "數據 / 資訊圖表"
版面類型： "雷達圖藝術"
設計細節：
  - "圖表：將如同蜘蛛網的雷達圖鋪滿整個畫面"
  - "數據線：以霓虹黃的粗線繪製數據"
  - "背景：薄薄地疊上一層如同舊地圖或設計圖的紋理"
風格：維他命・普普風 / 數位・新浪潮
特色：有機的形狀、明亮的配色、社群媒體風格的親切感
整體設計設定：
設計主題： "數位普普風 × 學術感 (Digital Pop & Academic)"
調性與風格： "現代、流動、親切、資訊密度高"
主視覺：
主題圖案： "阿米巴原蟲或雲朵般的有機形狀。以隨機方式配置，讓阿米巴原蟲的圖案環繞並裁切於投影片的四個角落。"
點綴： "圓點圖案、手繪風格的強調線條、社群媒體圖示風格的裝飾。"
配色方案：
基底色： "白色 (#FFFFFF) 或淺灰色的圓點背景。"
主要顏色： "鮮豔的粉紅色、青色、紫色（令人聯想到霓虹燈的顏色）。"
強調色： "黑色（用於文字或框線，用以收斂普普風格的色彩）。"
圖表顏色： "使用漸層色的長條圖（例如綠色→黃色）。"
字體排印：
標題： "黑體（粗體）。重視視覺衝擊力。也可使用外框字（白底+黑邊）。"
內文： "高可讀性的黑體。"
數字： "將西文字體放大使用，以強調數據（%）。"
設計應用時的注意事項：
"有機的形狀"： "不僅使用方形或正圓形，也要多加利用帶有手繪感『晃動』的線條與形狀，以表現社群的流動性。"
"圖示"： "比起人物照片，優先使用普普風格的插圖或抽象的虛擬替身圖示（例如帶有眼睛的圖形），以親切感為優先。"
"資訊的強弱對比"： "要意識到文字量多的頁面與以視覺為中心的頁面之間的對比。"
版面配置變化（型錄）：
類型： "標題・構圖"
設計： "在中央配置有機形狀的物件（雲朵或對話框），並將標題置於其中。周圍點綴小星星或閃亮亮的裝飾。"
類型： "文字＋數據普普風"
設計： "左右分割。左側為文字，右側為色彩繽紛的甜甜圈圖（使用鮮豔的粉紅、青、紫色，令人聯想到霓虹燈的顏色）。將數字以極大尺寸強調，創造視覺衝擊。"
類型： "有機時間軸"
設計： "如植物莖般蜿蜒的垂直線條。在成長的各個節點上配置『葉子』或『花蕾』般的圖示，並填入年份。"
類型： "泡泡・叢集"
設計： "如同肥皂泡泡般互相重疊的圓形。使用半透明的顏色來表現界線的模糊與融合感。背景鋪上圓點圖案，營造普普風格的印象。"
類型： "社群媒體聊天風格"
設計： "在類似智慧型手機畫面的框架中，以圖示和對話框配置對話形式的文字。重要的發言（洞見）以粗體或螢光筆風格的線條強調。用不同顏色的阿米巴原蟲狀圖形（圖示）來代表不同的對象。"
類型： "概念式・流程圖"
設計： "將『熱情 × 共鳴』這樣的算式，用蠟筆或麥克筆畫出的手繪風格線條與圖示來圖解。使用箭頭或手繪風格的裝飾，將生硬的理論以柔和的方式說明。"
類型： "多彩・步驟"
設計： "在由左至右的粗箭頭中寫下步驟名稱。每個步驟用繽紛的色彩（青色→紫色→粉紅色等）區分，將階段性的變化視覺化。"
類型： "棒棒糖圖表"
設計： "不使用一般的長條圖，而是使用在長條末端加上圓形的「棒棒糖圖」，或圓角長條圖。項目（類型名稱）放在橫軸，數值以垂直長條表示。每個類別用不同顏色區分，可堆疊或並排顯示。圖表上方可疊加折線圖（比率）形成複合圖表。"
類型： "貼紙・網格"
設計： "將方形卡片稍微傾斜配置，使其看起來像是用紙膠帶貼上的樣子。營造出便利貼或貼紙集合的感覺。"
類型： "角色・結尾"
設計： "在中央配置雲朵或阿米巴原蟲的角色。並列社群媒體圖示（圓形外框）並記載聯絡資訊。"
設計應用時的注意事項：
有機的形狀： "不僅使用方形或正圓形，也要多加利用帶有手繪感『晃動』的線條與形狀，以表現社群的流動性。"
圖示： "將黑白的人物或風景照片去背，與鮮豔的粉紅、青、紫色的普普風插圖、抽象虛擬替身圖示（如帶眼睛的圖形）、或阿米巴原蟲般的圖形疊加使用，以親切感為優先。"
資訊的強弱對比： "要意識到文字量多的頁面與以視覺為中心的頁面之間的對比。"
風格：運動 / 競技 / 活力
概念：「馳騁感與心跳」
整體設計設定：
色調： "熱情、迅速、強而有力、競爭心"
配色方案：
基底色： "#111111 (如瀝青般的黑色)"
文字顏色： "#FFFFFF (白色)"
強調色： "#CCFF00 (閃電萊姆綠) 或 #FF4500 (霓虹橘)"
漸層： "在照片上疊加由黑至透明的漸層效果"
字體排印：
標題： "斜體 (Italic) 的極粗黑體 (例如 Impact, Din Condensed)。"
內文： "斜體的無襯線體。"
數字： "如同背號般的模板字體或運動風格字體。"
通用版面規則：
導覽： "在斜切的形狀中放入頁碼。"
形狀： "將長方形或圖片『傾斜 (Skew)』，或使用平行四邊形。"
版面配置變化：
類型： "動態・剪影"
設計： "背景使用具動感的照片（帶有模糊感）。前景放置大的斜體文字，讓照片中的人物與文字部分重疊。"
類型： "VS (對決) 版面"
設計： "將畫面斜向一分為二。左下方為我方（優勢），右上方為競爭對手（課題）。以如閃電般的鋸齒狀線條分隔。"
類型： "速度・儀表板"
設計： "以汽車的速度儀表板或體育場的計分板風格來呈現達成率或數值。"
類型： "螢光・條紋"
設計： "在重要關鍵字的背景，鋪上如同用螢光筆迅速畫過的斜向條紋。"
風格：雕塑普普藝術 / 蒸氣波 / 霓虹超現實主義
概念：「古典藝術與現代流行單品的自由混搭」
整體設計設定：
主題： "古典雕塑 × 現代霓虹普普風（可變風格）"
調性： "大膽無畏、幽默、高飽和度、時尚、超現實"
視覺識別：
背景色： "每張投影片使用不同的高飽和度純色（如青色、洋紅色、黃色、萊姆綠、紫色等）"
拼貼素材：
雕像： "各種類型的古典白色大理石雕像（男性、女性、神話中的神祇、哲學家等，每張投影片更換）"
小工具： "現代流行單品（太陽眼鏡、耳機、智慧型手機、VR、食物）"
單品顏色： "調整單品的顏色，使其與背景色成『互補色（對比色）』或『同色系』"
字體排印：
標題： "極粗的無襯線體（如 Helvetica Now Display Black 等）"
文字顏色： "相對於背景色具有最高可視性的顏色（白色、黑色或與單品相同的強調色）"
版面配置變化（型錄）：
--- 強調視覺衝擊（主視覺） ---
類型： "飲料氛圍（封面）"
設計： "鮮豔的背景色。任一古典胸像戴著色彩繽紛的太陽眼鏡，用吸管喝著果汁（或蘇打水）的特寫。"
類型： "泡泡糖衝擊"
設計： "不同的背景色。雕像（女神或孩童等）吹著一個與背景顏色不同的大泡泡糖。周圍散佈幾何圖案。"
類型： "音樂頭像"
設計： "深色背景（黑色或深藍色）。雕像戴著色彩鮮豔的無線耳機，沉浸在音樂中（或正在操作智慧型手機）。"
類型： "吶喊色彩"
設計： "明亮的背景色（黃色或萊姆綠）。讓張著嘴或表情豐富的雕像戴上鏡片顏色花俏的太陽眼鏡。"
--- 概念・訊息（Concept） ---
類型： "分裂二元性"
設計： "將畫面左右分割為兩種不同顏色。將雕像配置在分界線上，左右手各持不同的現代單品（例如書本與平板、筆與智慧型手機）。"
類型： "自拍之王"
設計： "雕像高舉智慧型手機自拍的構圖。手機螢幕內顯示社群媒體風格的介面（按讚、留言）。"
類型： "VR・沉浸"
設計： "戴著VR眼鏡的雕像仰望著虛空。周圍漂浮著3D物件。"
--- 資訊傳達・功能（Information） ---
類型： "甜甜圈圖表"
設計： "使用真實的彩色「甜甜圈」或「披薩」照片來製作圓餅圖。雕像正準備吃它，或拿著它。"
類型： "單品清單"
設計： "雕像抱著運動鞋、滑板、手提音響等流行單品。每個單品旁都有對話框，內含功能說明。"
類型： "比較（A vs B）"
設計： "兩尊不同的雕像相對而立。一尊穿戴著古典裝飾（舊），另一尊則穿戴現代的帽子或飾品（新）。"
類型： "團隊底座"
設計： "在展示台（底座）上，並排多個比擬為團隊成員的胸像。每個胸像用不同顏色的太陽眼鏡或帽子來區分個性。"
類型： "QR 碼聯絡方式"
設計： "以超現實的方式結尾，雕像的額頭上貼著QR碼貼紙，或手上拿著QR碼的板子。"
設計規則：
"可變性（Variation）"： "所有投影片不使用同一尊雕像，隨機切換男性、女性、動物雕像等，以避免單調。"
"配色規則"： "「背景色」與「單品顏色」必須呈現高對比（例如：紫色背景搭配黃色單品）。"
"獨立性"： "將雕像與小物件從背景中乾淨地去背，使邊緣線條清晰銳利。"
風格：現代編輯風格 / 生活風格雜誌風 / 溫暖與精緻
概念：「以留白與空氣感敘事」
整體設計設定：
主題： "Kinfolk風格般的雜誌美學"
調性： "沉穩、感性、有機、知性"
視覺識別：
背景色： "沙米色 (#F3F0EB) 或 暖灰色 (#EBEBEB)"
文字顏色： "炭灰色 (#333333) - 避免使用純黑 (#000000)"
強調色： "赤陶色 (#E07A5F) 或 橄欖綠 (#708D81)"
圖片風格：
特色： "以自然光拍攝的照片、帶有底片顆粒的質感"
形狀： "拱窗般的形狀（頂部為半圓形）或 圓角矩形"
字體排印：
標題： "優雅的明體（襯線體）。重要的單詞以斜體強調。"
內文： "易於閱讀的幾何黑體（無襯線體）。"
數字： "舊式數字，或襯線體的數字。"
投影片結構：
章節： "封面"
版面類型： "雜誌封面風格"
設計細節：
- "版面配置：右半部放置滿版（無邊框）照片，左半部放置標題。"
- "標題：巨大的明體。分多行配置。"
- "裝飾：在主標題與副標題之間，畫一條極細的水平線。"
風格：石材與玻璃材質 / 現代建築風 / 穩重厚實
概念：「靜謐與物質感（Materiality）」
整體設計設定：
基調： 「靜謐、堅固、未來感、高級感」
素材感（紋理）：
- 背景：清水混凝土、大理石（Marble）或板岩（Slate）的質感。
- 圖層：使用磨砂玻璃（Frosted Glass / 玻璃擬態 Glassmorphism）效果來建立資訊層級。
- 光影：模擬自然光射入，呈現柔和且真實的陰影（採光燈光效果）。
配色方案：
- 底色：酷灰色 (#E0E0E0) 或 石材黑 (#1A1A1A)。
- 文字色：消光黑 (#000000) 或 消光白 (#FFFFFF)。
- 強調色：銅色（Copper）或黃銅色（Brass）等金屬色。
排版字體：
- 標題：具雕刻感的粗體無襯線體（如 Futura Bold 等），縮小字距。
- 本文：細體無襯線體。以極小尺寸配置，強調空間的寬廣感。
- 加工：加入如同將文字「壓凹（Deboss）」的視覺效果。
佈局變化：
類型：「巨石標題（Monolith Title）」
設計：在畫面中央配置一個如同巨大石碑（Monolith）的長方形，將標題如雕刻般嵌入其中。
類型：「玻璃卡片（Glass Card）」
設計：背景使用模糊的照片，前方懸浮一張如「磨砂玻璃」般的半透明卡片並承載文字。
類型：「建築網格（Architecture Grid）」
設計：使用如同混凝土接縫（勾縫）的細線分割畫面，配置圖像與文字。
類型：「材質圖表（Material Graph）」
設計：將長條圖以「石柱」或「金屬錠」等具立體感的材質表現。
類型：「燈光焦點（Lighting Focus）」
設計：如同黑暗房間中的聚光燈，僅照亮想要引起注意的一個重點。
設計規則：
「物理定律」： 假設光源來自左上方，保持陰影與高光的一致性。
「厚度」： 處理元素時需體現「厚度」感（例如改變側邊顏色等）。
風格：單線畫（One-line Drawing） / 大人感雅緻 / 莫蘭迪色系（Dusty Color）
概念：「不間斷的線條，和諧的呼吸」
整體設計設定：
基調： 「知性、流暢、平穩、藝術感、洗練」
視覺識別：
- 基本風格：所有的插圖、圖示與裝飾皆統一使用「一筆畫（One-line drawing）」風格。
- 線條特徵：具備強弱變化的有機線條。避免使用如尺規繪製的直線，保留手繪的律動感。
配色方案：
- 底色：#F4F5F7 (粉灰色) 或 #F0F2F0 (迷霧白)
- 線條色：#2C3E50 (午夜藍) 或 #4F5D54 (深橄欖綠)
- 強調色 1：#8DA399 (鼠尾草綠) —— 療癒與和諧
- 強調色 2：#9CADCE (灰藍色) —— 知性與寧靜
- 高光色：#E6E6FA (薰衣草霧) —— 隱約的甜美感
排版字體：
- 標題：優雅的明體（流暢的襯線體）。英文字體使用纖細的無襯線體或草寫體。
- 本文：易讀性高的纖細黑體（無襯線體）。
- 留白：行距放寬（2.0 倍），營造出通透、空氣流通般的佈局。
共通佈局規則：
圖示： 不使用獨立圖形，而是使用以一筆畫描繪的抽象圖示。
點綴元素： 在背景薄薄配置鼠尾草綠或灰藍色的「不定形水彩渲染（Watercolor wash）」，並在其上疊加線稿。
佈局變化：
類型：「單線英雄（One-line Hero）」
設計：在畫面中配置一個大跨度的一筆畫藝術（如：從女性側臉延伸至花朵的線條）。線條的一部分可兼作標題文字的底線。
類型：「流動故事（Flow Story）」
設計：將流程或年表表現為一根如「絲線」般的長線。在轉折處製作繩結或圓圈，並在該處配置文字。
類型：「植物清單（Botanical List）」
設計：將項目符號改為一筆畫的「葉片」或「花苞」。背景襯托淡綠色的有機形狀。
類型：「數據和諧（Data Harmony）」
設計：圓餅圖不採填色處理，而是以不同顏色的「線條」繪製成圓環圖。讓灰藍色與鼠尾草綠的線條相互交疊。
類型：「照片與線（Photo with Line）」
設計：照片不剪裁為矩形，而是改用拱形或橢圓形。順著照片輪廓，略微偏移地繪製手繪感的隨興線條。
類型：「概念關鍵字（Concept Keyword）」
設計：將關鍵字置於畫面中央，從文字處延伸出如植物藤蔓般的一筆畫裝飾並向外擴散。
類型：「對談訪談（Interview）」
設計：人物照片處理成黑白，背景配置淡藍色圓形。以不中斷的細線表現對話間的連結感。
類型：「三點構圖（3-point Composition）」
設計：以一筆畫線條（例如串聯三朵花的圖樣）將三個視覺要素連結起來。
設計規則：
「線條連續性」： 意識到要素與要素之間是由看不見的線相連，避免生硬的切斷感。
「色彩調性」： 嚴禁使用鮮豔色彩。全體統一為「灰調（Grayish）」色調，營造出成熟穩重的氛圍。
「排除純黑」： 純黑色（#000000）過於強烈會產生突兀感，因此改用深藍色或炭灰色作為「收斂色」。
風格：日本主義（Japonism）織物流動 / 和風現代優雅 / 和服拼貼
概念：「隨風飄揚的日式精神，交疊的傳統與創新」
整體設計設定：
基調： 「優雅、絢爛、流暢、傳統且前衛、故事性」
視覺識別：
- 背景色：生成色（原色）和紙 (#F6F4E8) —— 能看出纖維紋理的材質
- 文字色：墨色 (#2B2B2B) 或 鏽金色 (#B8860B)
- 強調色：緋紅色 (#C32121)、藍色 (#1D365D)、金泥・金箔色 (#C5A059)
- 主題元素：和服圖案（友禪、絞染）、浮世繪海浪、流雲（エ霞，日式傳統雲紋）、組紐（日式編織繩）
- 線條：如天女的羽衣般，柔軟地橫跨畫面的曲線
排版字體：
- 標題：極粗的明體（如 Ryumin 等）。大膽地結合直排與橫排。
- 本文：纖細的明體。行距放寬，注重留白之美（間）。
- 歐文：以優雅的襯線體（如 Didot 等）縮小作為點綴。
共通佈局規則：
「和服圖層」： 不同和風圖案的布料（織物）描繪出曲線並相互交疊的拼貼表現。
「散落金箔」： 在畫面的留白處，加入如同散落金箔或金粉般的雜訊紋理。
「不對稱之美」： 避免對稱（左右對稱），追求動態且不穩定的美感。
佈局變化：
類型：「腰帶（Obi）流動封面」
設計：在畫面對角線上配置如華麗和服腰帶般的粗曲線。其上疊加極粗的直排標題。
類型：「浮世繪剪影拼貼」
設計：將浮世繪（海浪或富士山）以撕裂布料般的有機形狀剪裁，並表現出黏貼於背景和紙上的效果。
類型：「組紐時間軸」
設計：一條紅色的「組紐（日式編織繩）」如穿梭般流淌過畫面，並在繩結（裝飾結）的位置配置年份或里程碑。
類型：「圓窗（En-sou）與流線」
設計：將照片配置於如和室圓窗般的框架中，周圍以流動的金色線條或霞紋裝飾。
類型：「家徽圖案圖表」
設計：將甜甜圈圖或圓餅圖以家徽或和風圖案（青海波或麻葉紋）的紋理進行填色區分。
類型：「直排故事」
設計：畫面右側配置直排訊息。左側則點綴由上往下流垂的「紫藤花」或「柳樹」剪影。
設計規則：
「質感融合」： 將「和紙的消光質感」與「絲綢（Silk）的光澤感」作對比。
「排除直線」： 邊框線或分隔線不使用直線，改用如毛筆描繪般帶有「起筆（入り）」與「收筆（抜き）」的線條，或是布料的曲線。
「交疊」： 將圖像與文字、圖案與圖案大膽地交疊（Overlay），營造出景深層次。
`;

        // --- APP LOGIC ---
        let currentStyles = {};
        let activeStyleData = null;

        function parseStyles(text) {
            const styles = {};
            let currentName = null;
            let currentSection = null;

            text.split('\n').forEach(line => {
                line = line.trim();
                if (!line) return;

                if (line.startsWith("風格：")) {
                    currentName = line.split("：")[1].trim();
                    styles[currentName] = { 
                        name: currentName, 
                        concept: "", 
                        design_settings: {}, 
                        layout_variations: [], 
                        rules: [] 
                    };
                    currentSection = "general";
                } else if (currentName) {
                    const style = styles[currentName];
                    if (line.startsWith("概念：")) {
                        style.concept = line.split("：")[1].trim().replace(/^"|"$/g, '');
                    } else if (line.startsWith("整體設計設定：")) {
                        currentSection = "design_settings";
                    } else if (line.indexOf("版面配置變化") !== -1) {
                        currentSection = "layout_variations";
                    } else if (line.startsWith("設計規則：") || line.startsWith("通用版面規則：") || line.startsWith("設計應用時的注意事項：")) {
                        currentSection = "rules";
                    } else if (line.startsWith("投影片結構模式：") || line.startsWith("投影片結構：")) {
                        currentSection = "structure";
                    } else if (currentSection === "design_settings" && line.includes("：")) {
                        const [k, v] = line.split("：", 2);
                        style.design_settings[k.trim()] = v.trim().replace(/^"|"$/g, '');
                    } else if (currentSection === "layout_variations") {
                        if (line.startsWith("類型：")) {
                            style.layout_variations.push({ type: line.split("：")[1].trim().replace(/^"|"$/g, ''), design: "" });
                        } else if (line.startsWith("設計：") && style.layout_variations.length > 0) {
                            style.layout_variations[style.layout_variations.length-1].design = line.split("：")[1].trim().replace(/^"|"$/g, '');
                        }
                    } else if (currentSection === "rules") {
                         if (line.includes("：")) {
                             style.rules.push(line.replace(/^"|"$/g, ''));
                         } else if (line.startsWith("- ")) {
                             style.rules.push(line.substring(2).replace(/^"|"$/g, ''));
                         }
                    }
                }
            });
            return styles;
        }

        function init() {
            currentStyles = parseStyles(STYLE_SOURCE);
            const styleSelect = document.getElementById("styleSelect");
            styleSelect.innerHTML = '<option disabled selected>請選擇風格...</option>';
            
            Object.keys(currentStyles).forEach(name => {
                const opt = document.createElement("option");
                opt.value = name;
                opt.textContent = name;
                styleSelect.appendChild(opt);
            });

            // Event Listeners
            document.getElementById("modeSelect").addEventListener("change", e => {
                const isAI = e.target.value === "ai";
                document.getElementById("selectArea").classList.toggle("hidden", isAI);
                document.getElementById("aiArea").classList.toggle("hidden", !isAI);
            });

            styleSelect.addEventListener("change", e => {
                loadStyle(currentStyles[e.target.value]);
            });

            document.getElementById("btnGenerate").addEventListener("click", () => {
                const kw = document.getElementById("aiKeywords").value || "未知";
                const mockStyle = {
                    name: `AI Generative: ${kw}`,
                    concept: `基於「${kw}」的數位藝術實驗，融合前衛感與功能性。`,
                    design_settings: {
                        "基調": "AI生成的動態調性",
                        "色彩": "依照關鍵字產生的動態色板",
                        "字體": "現代無襯線體"
                    },
                    layout_variations: [{ type: "AI封面", design: "具備視覺衝擊力的幾何構圖" }],
                    rules: ["保持簡潔", "高對比度"]
                };
                loadStyle(mockStyle);
            });

            document.getElementById("btnCopyPrompt").addEventListener("click", () => {
                const text = document.getElementById("promptOutput").textContent;
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.getElementById("btnCopyPrompt");
                    btn.textContent = "已複製！";
                    setTimeout(() => btn.textContent = "複製", 2000);
                });
            });

            document.getElementById("btnDownload").addEventListener("click", () => {
                if (!activeStyleData) return;
                const spec = buildSpecSheet(activeStyleData);
                const blob = new Blob([spec], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${activeStyleData.name.replace(/\//g, '_')}_spec.md`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });
        }

        function loadStyle(data) {
            activeStyleData = JSON.parse(JSON.stringify(data)); // Deep copy
            document.getElementById("editName").value = activeStyleData.name;
            document.getElementById("editConcept").value = activeStyleData.concept;
            
            const dynamicArea = document.getElementById("dynamicSettings");
            dynamicArea.innerHTML = "";
            
            Object.entries(activeStyleData.design_settings).forEach(([k, v]) => {
                const div = document.createElement("div");
                div.className = "form-control";
                div.innerHTML = `
                    <label class="label"><span class="label-text text-gray-400">${k}</span></label>
                    <input type="text" value="${v}" class="input input-bordered bg-neutral-900 border-gray-700 dynamic-input" data-key="${k}" />
                `;
                dynamicArea.appendChild(div);
            });

            // Add real-time update listeners
            document.getElementById("editName").oninput = updateAndRefit;
            document.getElementById("editConcept").oninput = updateAndRefit;
            document.querySelectorAll(".dynamic-input").forEach(inp => {
                inp.oninput = updateAndRefit;
            });

            updateAndRefit();
        }

        function updateAndRefit() {
            if (!activeStyleData) return;
            activeStyleData.name = document.getElementById("editName").value;
            activeStyleData.concept = document.getElementById("editConcept").value;
            
            document.querySelectorAll(".dynamic-input").forEach(inp => {
                activeStyleData.design_settings[inp.dataset.key] = inp.value;
            });

            // Refresh Output
            document.getElementById("promptOutput").textContent = buildPrompt(activeStyleData);
            document.getElementById("specOutput").textContent = buildSpecSheet(activeStyleData);
        }

        function buildPrompt(data) {
            let p = `Design a high-quality presentation slide. \nStyle: ${data.name}. \nConcept: ${data.concept}. \n`;
            p += "Visual Elements: \n";
            Object.entries(data.design_settings).forEach(([k, v]) => {
                p += `- ${k}: ${v}. \n`;
            });
            p += "render, 8k, highly detailed, UI/UX design, presentation design, dribbble, behance.";
            return p;
        }

        function buildSpecSheet(data) {
            let s = `# 風格規範: ${data.name}\n\n`;
            s += `## 概念\n${data.concept}\n\n`;
            s += `## 視覺識別\n`;
            Object.entries(data.design_settings).forEach(([k, v]) => {
                s += `- **${k}**: ${v}\n`;
            });
            s += `\n## 版面配置參考\n`;
            data.layout_variations.forEach(v => {
                s += `- **${v.type}**: ${v.design}\n`;
            });
            s += `\n## 設計規則\n`;
            data.rules.forEach(r => {
                s += `- ${r}\n`;
            });
            return s;
        }

        // Run
        init();
    </script>
